name: Docker Base Image

on:
  push:
    branches: [main, develop, feature/*]
    paths:
      - "backend/Dockerfile.base"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker-base.yml"
  schedule:
    - cron: "5 4 * * *"
  workflow_dispatch: {}

jobs:
  base_image_dev:
    name: Base Image w/ dev dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 🛎️
        uses: actions/checkout@v5
      - name: Copy dependency files 📦
        run: cp pyproject.toml uv.lock backend/
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build & push Docker image 🐳
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile.base
          push: true
          tags: kaktus42acc/medconb-backend-base:dev
          build-args: INCLUDE_DEV=true

  base_image_prod:
    name: Base Image w/o dev dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 🛎️
        uses: actions/checkout@v5
      - name: Copy dependency files 📦
        run: cp pyproject.toml uv.lock backend/
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build & push Docker image 🐳
        uses: docker/build-push-action@v7
        with:
          context: backend/
          file: backend/Dockerfile.base
          push: true
          tags: kaktus42acc/medconb-backend-base:prod
